# 개발 환경 설정 (values-dev.yaml)
# 빠른 반복 개발을 위한 최소한의 리소스로 설정

global:
  environment: development
  domain: bank-dev.example.com
  tls:
    enabled: false  # HTTPS 생략

deployment:
  replicas:
    initial: 1
    min: 1
    max: 3

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

service:
  external:
    type: NodePort  # LoadBalancer 대신 NodePort 사용

ingress:
  enabled: false  # Ingress 비활성화

autoscaling:
  enabled: false  # 오토스케일링 비활성화

podDisruptionBudget:
  enabled: false  # PDB 비활성화

networkPolicy:
  enabled: false  # 네트워크 정책 비활성화

monitoring:
  enabled: true
  alerts:
    enabled: false  # 알람 비활성화 (개발 환경에선 필요 없음)

configMap:
  rustLog: debug  # DEBUG 레벨 로깅

persistence:
  enabled: true
  data:
    size: 1Gi  # 작은 스토리지

debug:
  enabled: true
  verboseLogging: true
  pprofEnabled: true  # pprof 디버깅 활성화
