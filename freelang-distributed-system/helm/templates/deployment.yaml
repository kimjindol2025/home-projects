apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "distributed-bank.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "distributed-bank.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.deployment.replicas.initial }}
  {{- end }}
  strategy:
    type: {{ .Values.deployment.strategy }}
    {{- if eq .Values.deployment.strategy "RollingUpdate" }}
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  selector:
    matchLabels:
      {{- include "distributed-bank.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "distributed-bank.selectorLabels" . | nindent 8 }}
    spec:
      # 보안 컨텍스트
      securityContext:
        {{- toYaml .Values.deployment.securityContext | nindent 8 }}

      # Pod 배치 정책
      {{- if .Values.deployment.affinity.podAntiAffinity }}
      affinity:
        podAntiAffinity:
          {{- if eq .Values.deployment.affinity.podAntiAffinity "required" }}
          requiredDuringSchedulingIgnoredDuringExecution:
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
          {{- end }}
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - {{ .Values.deployment.name }}
            topologyKey: kubernetes.io/hostname
      {{- end }}

      # 볼륨 정의
      volumes:
      {{- if .Values.persistence.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "distributed-bank.fullname" . }}-data
      {{- end }}
      {{- if .Values.persistence.tls.enabled }}
      - name: tls-certs
        secret:
          secretName: {{ include "distributed-bank.fullname" . }}-tls
      {{- end }}
      - name: config
        configMap:
          name: {{ include "distributed-bank.fullname" . }}-config
          defaultMode: 0555

      # 컨테이너
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        # 포트
        ports:
        - name: http
          containerPort: {{ .Values.service.internal.ports.http }}
          protocol: TCP
        - name: raft
          containerPort: {{ .Values.service.internal.ports.raft }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.debug.metricsPort }}
          protocol: TCP

        # 환경 변수
        env:
        - name: RUST_LOG
          valueFrom:
            configMapKeyRef:
              name: {{ include "distributed-bank.fullname" . }}-config
              key: RUST_LOG
        - name: TLS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: {{ include "distributed-bank.fullname" . }}-config
              key: TLS_ENABLED
        - name: TLS_CERT_PATH
          valueFrom:
            configMapKeyRef:
              name: {{ include "distributed-bank.fullname" . }}-config
              key: TLS_CERT_PATH
        - name: TLS_KEY_PATH
          valueFrom:
            configMapKeyRef:
              name: {{ include "distributed-bank.fullname" . }}-config
              key: TLS_KEY_PATH
        - name: ENCRYPTION_ENABLED
          valueFrom:
            configMapKeyRef:
              name: {{ include "distributed-bank.fullname" . }}-config
              key: ENCRYPTION_ENABLED
        - name: DB_PATH
          valueFrom:
            configMapKeyRef:
              name: {{ include "distributed-bank.fullname" . }}-config
              key: DB_PATH
        - name: RAFT_NODE_ID
          valueFrom:
            configMapKeyRef:
              name: {{ include "distributed-bank.fullname" . }}-config
              key: RAFT_NODE_ID
        - name: RAFT_PEERS
          valueFrom:
            configMapKeyRef:
              name: {{ include "distributed-bank.fullname" . }}-config
              key: RAFT_PEERS
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        # 리소스 제한
        resources:
          {{- toYaml .Values.deployment.resources | nindent 12 }}

        # Liveness Probe
        {{- if .Values.healthChecks.liveness.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.healthChecks.liveness.path }}
            port: http
          initialDelaySeconds: {{ .Values.healthChecks.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthChecks.liveness.periodSeconds }}
          timeoutSeconds: {{ .Values.healthChecks.liveness.timeoutSeconds }}
          failureThreshold: {{ .Values.healthChecks.liveness.failureThreshold }}
        {{- end }}

        # Readiness Probe
        {{- if .Values.healthChecks.readiness.enabled }}
        readinessProbe:
          httpGet:
            path: {{ .Values.healthChecks.readiness.path }}
            port: http
          initialDelaySeconds: {{ .Values.healthChecks.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthChecks.readiness.periodSeconds }}
          timeoutSeconds: {{ .Values.healthChecks.readiness.timeoutSeconds }}
          failureThreshold: {{ .Values.healthChecks.readiness.failureThreshold }}
        {{- end }}

        # Startup Probe
        {{- if .Values.healthChecks.startup.enabled }}
        startupProbe:
          httpGet:
            path: {{ .Values.healthChecks.startup.path }}
            port: http
          initialDelaySeconds: {{ .Values.healthChecks.startup.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthChecks.startup.periodSeconds }}
          failureThreshold: {{ .Values.healthChecks.startup.failureThreshold }}
        {{- end }}

        # 볼륨 마운트
        volumeMounts:
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: {{ .Values.persistence.data.mountPath }}
        {{- end }}
        {{- if .Values.persistence.tls.enabled }}
        - name: tls-certs
          mountPath: {{ .Values.persistence.tls.mountPath }}
          readOnly: true
        {{- end }}
        - name: config
          mountPath: /etc/config
          readOnly: true

      # 종료 시간 제한
      terminationGracePeriodSeconds: 30
