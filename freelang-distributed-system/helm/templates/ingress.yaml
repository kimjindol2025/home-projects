{{- if .Values.ingress.enabled }}
---
# Ingress: 외부 접근 관리
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "distributed-bank.fullname" . }}-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "distributed-bank.labels" . | nindent 4 }}
    component: ingress
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}

  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    {{- range .Values.ingress.hosts }}
    - {{ .name }}
    {{- end }}
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}

  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .name }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: {{ .pathType }}
        backend:
          service:
            name: {{ .backend | splitList ":" | first }}
            port:
              number: {{ .backend | splitList ":" | last | atoi }}
      {{- end }}
  {{- end }}

---
# NetworkPolicy: 트래픽 제어
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "distributed-bank.fullname" . }}-netpol
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "distributed-bank.labels" . | nindent 4 }}
    component: network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "distributed-bank.selectorLabels" . | nindent 6 }}

  policyTypes:
  - Ingress
  - Egress

  # 수신 규칙
  ingress:
  - from:
    {{- if .Values.networkPolicy.allowIngressFromNamespace }}
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.networkPolicy.allowIngressFromNamespace }}
    {{- end }}
    ports:
    - protocol: TCP
      port: {{ .Values.service.internal.ports.http }}

  # 송신 규칙
  egress:
  # DNS
  {{- if .Values.networkPolicy.allowEgressToDns }}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  {{- end }}

  # 외부 통신
  {{- if .Values.networkPolicy.allowEgressToExternal }}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  {{- end }}
{{- end }}
{{- end }}
