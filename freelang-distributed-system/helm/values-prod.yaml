# 프로덕션 환경 설정 (values-prod.yaml)
# 고가용성, 보안, 성능 최적화

global:
  environment: production
  domain: bank.example.com
  tls:
    enabled: true
    issuer: letsencrypt-prod

deployment:
  replicas:
    initial: 5
    min: 5
    max: 20

  affinity:
    podAntiAffinity: required  # Pod 분산 필수

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

healthChecks:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

  readiness:
    initialDelaySeconds: 20
    periodSeconds: 5
    failureThreshold: 2

  startup:
    failureThreshold: 60  # 시작에 더 많은 시간 허용

service:
  external:
    type: LoadBalancer
    sessionAffinity:
      enabled: true
      timeoutSeconds: 3600

ingress:
  enabled: true
  className: nginx
  tls:
    enabled: true
    secretName: distributed-bank-tls
  hosts:
    - name: bank.example.com
      paths:
        - path: /
          pathType: Prefix
    - name: api.bank.example.com
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  metrics:
    cpu:
      targetUtilization: 65  # 더 낮은 임계값 (여유있게)
    memory:
      targetUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # 10분 대기

podDisruptionBudget:
  enabled: true
  minAvailable: 3  # 최소 3개 유지 (고가용성)

networkPolicy:
  enabled: true
  allowIngressFromNamespace: ingress-nginx
  allowEgressToDns: true
  allowEgressToExternal: true  # 외부 통신 허용 가능

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
  alerts:
    enabled: true
    rules:
      - highCpuUsage:
          threshold: 75
          duration: 5m
      - highMemoryUsage:
          threshold: 80
          duration: 5m
      - highPodRestartRate:
          threshold: 0.05
          duration: 15m
      - highErrorRate:
          threshold: 1
          duration: 5m
      - highResponseTime:
          threshold: 100
          duration: 5m
      - podNotReady:
          duration: 5m

configMap:
  rustLog: warn  # 프로덕션에선 WARN 이상만

persistence:
  enabled: true
  data:
    storageClass: fast-ssd  # 고성능 스토리지
    size: 50Gi
    mountPath: /data

debug:
  enabled: false
  verboseLogging: false
  pprofEnabled: false
  metricsPort: 8888
