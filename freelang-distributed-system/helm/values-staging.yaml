# 스테이징 환경 설정 (values-staging.yaml)
# 프로덕션과 유사하지만 리소스는 낮은 설정 (테스트용)

global:
  environment: staging
  domain: bank-staging.example.com
  tls:
    enabled: true

deployment:
  replicas:
    initial: 2
    min: 2
    max: 5

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

service:
  external:
    type: LoadBalancer

ingress:
  enabled: true
  className: nginx
  hosts:
    - name: bank-staging.example.com
      paths:
        - path: /
          pathType: Prefix
          backend: distributed-bank-lb:8080

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  metrics:
    cpu:
      targetUtilization: 75
    memory:
      targetUtilization: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1  # 최소 1개 유지

networkPolicy:
  enabled: true
  allowEgressToExternal: false

monitoring:
  enabled: true
  alerts:
    enabled: true
    rules:
      - highCpuUsage:
          threshold: 80
      - highMemoryUsage:
          threshold: 85
      - highErrorRate:
          threshold: 10  # 더 높은 임계값

configMap:
  rustLog: info

persistence:
  enabled: true
  data:
    size: 5Gi

debug:
  enabled: false
  pprofEnabled: false
