---
# Deployment: 분산 은행 시스템
apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributed-bank
  namespace: distributed-bank
  labels:
    app: distributed-bank
    version: "1.0.0"
spec:
  # 초기 레플리카 수 (HPA가 관리)
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: distributed-bank

  template:
    metadata:
      labels:
        app: distributed-bank
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      # 안티어피니티: 다른 노드에 배치
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - distributed-bank
              topologyKey: kubernetes.io/hostname

      # 종료 기간: 30초
      terminationGracePeriodSeconds: 30

      # 초기화 컨테이너
      initContainers:
      - name: wait-for-ready
        image: busybox:1.28
        command: ['sh', '-c', 'echo "Pod is starting..."']

      # 컨테이너
      containers:
      - name: distributed-bank
        image: distributed_bank:1.0.0
        imagePullPolicy: IfNotPresent

        # 포트
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: raft
          containerPort: 9000
          protocol: TCP

        # 환경변수
        envFrom:
        - configMapRef:
            name: distributed-bank-config

        # 리소스 요청 및 제한
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Liveness Probe (재시작 판단)
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness Probe (트래픽 수신 판단)
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # 시작 프로브 (초기 시작 대기)
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

        # 볼륨 마운트
        volumeMounts:
        - name: certs
          mountPath: /app/certs
          readOnly: true
        - name: data
          mountPath: /app/data

        # 보안 컨텍스트
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

      # 볼륨
      volumes:
      - name: certs
        secret:
          secretName: distributed-bank-tls
      - name: data
        emptyDir: {}

      # 재시작 정책
      restartPolicy: Always

      # 보안 정책
      securityContext:
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
