---
# Ingress: 외부 접근 관리
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: distributed-bank-ingress
  namespace: distributed-bank
  labels:
    app: distributed-bank

  annotations:
    # nginx-ingress 애노테이션
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # 속도 제한 (분당 100 요청)
    nginx.ingress.kubernetes.io/limit-rps: "100"

    # 타임아웃
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"

    # 헬스 체크
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: nginx

  # TLS 설정
  tls:
  - hosts:
    - bank.example.com
    - api.bank.example.com
    secretName: distributed-bank-tls

  # 라우팅 규칙
  rules:

  # 메인 도메인
  - host: bank.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: distributed-bank-lb
            port:
              number: 8080

  # API 도메인
  - host: api.bank.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: distributed-bank
            port:
              number: 8080

  # 헬스 체크 경로
  - host: health.bank.example.com
    http:
      paths:
      - path: /health
        pathType: Exact
        backend:
          service:
            name: distributed-bank
            port:
              number: 8080

---
# NetworkPolicy: 트래픽 제어
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: distributed-bank-netpol
  namespace: distributed-bank

spec:
  podSelector:
    matchLabels:
      app: distributed-bank

  # 수신 트래픽 허용
  policyTypes:
  - Ingress
  - Egress

  # 수신 규칙
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080

  # 송신 규칙
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53    # DNS
    - protocol: UDP
      port: 53
