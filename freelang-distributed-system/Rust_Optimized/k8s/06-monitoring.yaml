---
# ServiceMonitor: Prometheus 모니터링
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: distributed-bank
  namespace: distributed-bank
  labels:
    app: distributed-bank

spec:
  selector:
    matchLabels:
      app: distributed-bank

  endpoints:
  - port: http
    interval: 30s
    path: /metrics

---
# PrometheusRule: 알람 규칙
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: distributed-bank
  namespace: distributed-bank
  labels:
    app: distributed-bank

spec:
  groups:
  - name: distributed_bank.rules
    interval: 30s

    rules:

    # CPU 사용률 높음
    - alert: HighCPUUsage
      expr: |
        rate(container_cpu_usage_seconds_total{pod=~"distributed-bank-.*"}[5m]) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "높은 CPU 사용률 감지"
        description: "Pod {{ $labels.pod }}의 CPU 사용률이 80%를 초과했습니다."

    # 메모리 사용률 높음
    - alert: HighMemoryUsage
      expr: |
        container_memory_usage_bytes{pod=~"distributed-bank-.*"} /
        container_spec_memory_limit_bytes > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "높은 메모리 사용률 감지"
        description: "Pod {{ $labels.pod }}의 메모리 사용률이 85%를 초과했습니다."

    # Pod 재시작 빈도
    - alert: HighPodRestartRate
      expr: |
        rate(kube_pod_container_status_restarts_total{pod=~"distributed-bank-.*"}[15m]) > 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "높은 Pod 재시작 빈도"
        description: "Pod {{ $labels.pod }}이 자주 재시작되고 있습니다."

    # 요청 실패율
    - alert: HighErrorRate
      expr: |
        rate(http_request_duration_seconds_bucket{status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "높은 요청 실패율"
        description: "5분 이내 실패율이 5%를 초과했습니다."

    # 응답 시간 증가
    - alert: HighResponseTime
      expr: |
        histogram_quantile(0.99,
          rate(http_request_duration_seconds_bucket[5m])) > 0.050
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "높은 응답 시간"
        description: "P99 응답 시간이 50ms를 초과했습니다."

    # Pod 준비 상태 실패
    - alert: PodNotReady
      expr: |
        kube_pod_status_ready{pod=~"distributed-bank-.*", condition="true"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pod가 준비되지 않음"
        description: "Pod {{ $labels.pod }}이 준비 상태로 전환되지 않았습니다."
