---
# Horizontal Pod Autoscaler (HPA) v2
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: distributed-bank-hpa
  namespace: distributed-bank
  labels:
    app: distributed-bank

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: distributed-bank

  # 최소 3개, 최대 10개 Pod
  minReplicas: 3
  maxReplicas: 10

  # 메트릭 기반 스케일링
  metrics:

  # CPU 기반 (70% 초과 시 스케일 업)
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  # 메모리 기반 (80% 초과 시 스케일 업)
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  # 스케일링 동작
  behavior:

    # 스케일 업: 신속하게
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      # 30초마다 100% 증가 (3 → 6 pods)
      - type: Percent
        value: 100
        periodSeconds: 30
      # 또는 30초마다 2개 추가
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max  # 더 빠른 정책 선택

    # 스케일 다운: 천천히
    scaleDown:
      stabilizationWindowSeconds: 300  # 5분 대기
      policies:
      # 60초마다 50% 감소 (10 → 5 pods)
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Min  # 더 보수적인 정책

---
# Pod Disruption Budget (최소 2개 Pod 유지)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: distributed-bank-pdb
  namespace: distributed-bank

spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: distributed-bank
