version: '3.9'

services:
  # ===== Raft Leader (Node 0) =====
  raft-leader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distributed_bank_leader
    ports:
      - "8080:8080"     # HTTP/Proxy
      - "9000:9000"     # Raft
    environment:
      - RUST_LOG=info
      - NODE_ID=0
      - NODE_TYPE=leader
      - TLS_ENABLED=false
      - ENCRYPTION_ENABLED=true
    networks:
      - bank_network
    volumes:
      - ./certs:/app/certs:ro
      - bank_data_0:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      - raft-follower-1
      - raft-follower-2
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== Raft Follower 1 (Node 1) =====
  raft-follower-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distributed_bank_follower_1
    ports:
      - "9100:9100"     # Raft
    environment:
      - RUST_LOG=info
      - NODE_ID=1
      - NODE_TYPE=follower
      - LEADER_ADDR=raft-leader:9000
    networks:
      - bank_network
    volumes:
      - bank_data_1:/app/data
    restart: unless-stopped
    depends_on:
      - raft-leader
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== Raft Follower 2 (Node 2) =====
  raft-follower-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distributed_bank_follower_2
    ports:
      - "9200:9200"     # Raft
    environment:
      - RUST_LOG=info
      - NODE_ID=2
      - NODE_TYPE=follower
      - LEADER_ADDR=raft-leader:9000
    networks:
      - bank_network
    volumes:
      - bank_data_2:/app/data
    restart: unless-stopped
    depends_on:
      - raft-leader
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== Monitoring (선택사항) =====
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: distributed_bank_prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus_data:/prometheus
  #   networks:
  #     - bank_network
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #   restart: unless-stopped

networks:
  bank_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  bank_data_0:
    driver: local
  bank_data_1:
    driver: local
  bank_data_2:
    driver: local
  # prometheus_data:
  #   driver: local
